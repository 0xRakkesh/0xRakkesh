name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Codeberg dark snake
        run: |
          npx generate-snake-animation@3 \
            --forgejo_user codeberg.org/0xRakkesh \
            --output codeberg-snake-dark.svg?palette=codeberg-dark

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update snake"
          file_pattern: codeberg-snake-dark.svg